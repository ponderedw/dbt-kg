name: Docker Publish

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  docker-api:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            src:
              - 'app/**'
              - 'dbt_graph_loader/**'
              - 'Dockerfile.server'
              - 'pyproject.toml'
              - 'poetry.lock'
              - 'requirements-dev.txt'
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        if: steps.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: steps.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: steps.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
      -
        name: Generate timestamp
        id: timestamp
        run: echo "timestamp=$(date +%s)" >> $GITHUB_OUTPUT
        if: steps.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
      -
        name: Build and push API
        uses: docker/build-push-action@v6
        if: steps.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
        with:
          context: .
          file: ./Dockerfile.server
          push: true
          tags: pondered/dbt-kg-api:latest,pondered/dbt-kg-api:${{ steps.timestamp.outputs.timestamp }}
          platforms: linux/amd64,linux/arm64

  docker-chat:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            src:
              - 'streamlit/**'
      -
        name: Login to Docker Hub
        uses: docker/login-action@v3
        if: steps.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: steps.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: steps.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
      -
        name: Generate timestamp
        id: timestamp
        run: echo "timestamp=$(date +%s)" >> $GITHUB_OUTPUT
        if: steps.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
      -
        name: Build and push Chat
        uses: docker/build-push-action@v6
        if: steps.changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch'
        with:
          context: .
          file: ./streamlit/.Dockerfile
          push: true
          tags: pondered/dbt-kg-chat:latest,pondered/dbt-kg-chat:${{ steps.timestamp.outputs.timestamp }}
          platforms: linux/amd64,linux/arm64
