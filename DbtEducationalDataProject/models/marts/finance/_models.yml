version: 2

models:
  - name: student_financial_profile
    description: >
      Complete financial profile per student combining tuition charges, aid
      awards and payment history. Provides a single view of each student's
      financial standing used for collections, compliance and counseling.
    columns:
      - name: student_id
        description: Unique student identifier; grain is one row per student per quarter.
      - name: quarter_id
        description: Foreign key to the quarter.
      - name: total_tuition_charged
        description: Total tuition and fees billed for the quarter.
      - name: total_aid_awarded
        description: Total financial aid awarded for the quarter.
      - name: total_payments_made
        description: Total cash payments received for the quarter.
      - name: outstanding_balance
        description: Remaining balance owed (charged minus aid and payments).
      - name: has_financial_hold
        description: True if the student has an unresolved financial hold.
      - name: aid_types_received
        description: Comma-separated list of aid categories received this quarter.
      - name: net_cost
        description: Total tuition charged minus total aid awarded.

  - name: tuition_revenue_analysis
    description: >
      Tuition revenue analysis broken down by quarter, department and
      payment method. Tracks gross revenue, refunds and net collected amounts
      to support financial forecasting.
    columns:
      - name: quarter_id
        description: Foreign key to the quarter.
      - name: department_id
        description: Foreign key to the department (based on students' majors).
      - name: gross_tuition_billed
        description: Total tuition billed before adjustments and aid.
      - name: total_aid_disbursed
        description: Total aid applied as tuition credit.
      - name: net_tuition_revenue
        description: Gross billed minus aid disbursed.
      - name: cash_collected
        description: Total cash payments received.
      - name: outstanding_receivables
        description: Total balances not yet paid or covered by aid.
      - name: payment_completion_rate
        description: Fraction of billed amounts fully settled.

  - name: financial_aid_impact_analysis
    description: >
      Impact analysis of financial aid on student retention and academic
      success. Compares outcomes between aided and non-aided student
      populations to evaluate aid programme effectiveness.
    columns:
      - name: quarter_id
        description: Foreign key to the quarter.
      - name: aid_type
        description: Type of financial aid (grant, scholarship, loan, etc.).
      - name: aided_student_count
        description: Number of students receiving this aid type.
      - name: avg_gpa_aided
        description: Average GPA of students receiving this aid.
      - name: avg_gpa_unaided
        description: Average GPA of students not receiving any aid.
      - name: retention_rate_aided
        description: Quarter-to-quarter retention rate for aided students.
      - name: retention_rate_unaided
        description: Quarter-to-quarter retention rate for unaided students.
      - name: aid_impact_score
        description: Estimated lift in retention attributable to the aid programme.

  - name: budget_allocation_optimization
    description: >
      Budget allocation efficiency analysis by department. Measures
      cost-effectiveness using credit-hour production, student outcomes
      and faculty utilisation as value drivers.
    columns:
      - name: department_id
        description: Foreign key to the academic department.
      - name: fiscal_year
        description: Fiscal year the budget data applies to.
      - name: allocated_budget
        description: Total budget allocated to the department.
      - name: actual_spend
        description: Actual expenditure for the fiscal year.
      - name: budget_variance
        description: Allocated minus actual spend (positive = under-budget).
      - name: credit_hours_produced
        description: Total credit hours generated by department courses.
      - name: cost_per_credit_hour
        description: Actual spend divided by credit hours produced.
      - name: efficiency_score
        description: Composite efficiency score relative to peer departments.
      - name: recommended_adjustment_pct
        description: Suggested budget change percentage based on efficiency analysis.

  - name: institutional_revenue_optimization
    description: >
      Revenue optimisation recommendations based on enrollment patterns,
      tuition elasticity and aid spend efficiency. Used by finance leadership
      for annual tuition-setting and aid strategy decisions.
    columns:
      - name: programme_id
        description: Academic programme (department and level combination).
      - name: current_tuition_rate
        description: Current per-credit-hour tuition rate for this programme.
      - name: avg_enrollment_last_3_years
        description: Average annual enrollment over the past three years.
      - name: tuition_revenue_last_year
        description: Total tuition revenue generated last year.
      - name: aid_spend_last_year
        description: Total financial aid disbursed to programme students last year.
      - name: net_revenue_last_year
        description: Tuition revenue minus aid spend.
      - name: enrollment_price_elasticity
        description: Estimated sensitivity of enrollment to tuition changes (negative = demand falls with price increases).
      - name: revenue_optimisation_opportunity
        description: Estimated revenue uplift from recommended rate or aid adjustments.
